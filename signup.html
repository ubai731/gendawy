<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign in</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="Uicon.png" type="image/x-icon" />
  </head>
  <body>
    <main>
      <form id="myForm">
        <input
          required=""
          type="text"
          name="username"
          id="username"
          placeholder="username"
        />
        <br />
        <input
          required=""
          type="email"
          name="email"
          id="email"
          placeholder="email"
        />
        <br />
        <input
          required=""
          type="password"
          name="password"
          id="password"
          placeholder="password"
        />
        <br />
        <button id = "sub" type="submit">create account</button>
      </form>
      <p id="result"></p>
    </main>
  </body>
  <script src="JS/signup.js"></script> 
</html>
