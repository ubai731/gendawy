<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>log in</title>
    <link rel="shortcut icon" href="Uicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <form id="loginForm">
        <input
          required=""
          type="text"
          name="username"
          id="username"
          placeholder="username"
        />
        <br />
        <input
          required=""
          type="email"
          name="email"
          id="email"
          placeholder="email"
        />
        <br />
        <input
          required=""
          type="password"
          name="password"
          id="password"
          placeholder="password"
        />
        <button type="submit">log in</button>
      </form>
      <p id="msg"></p>
    </main>
  </body>
  <script src="JS/login.js"></script>
</html>
